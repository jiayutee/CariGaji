    <style>
      *, *::before, *::after { box-sizing: border-box; }

        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-touch-callout: none;

      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: auto;
        -webkit-touch-callout: none;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'DM Sans', sans-serif;
      }
    </style>
